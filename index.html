<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maaf Ya - Untuk Kesayanganku</title>
    <!-- Menggunakan Tailwind CSS untuk styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700&display=swap');
        
        body {
            font-family: 'Quicksand', sans-serif;
            user-select: none; 
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .fade-transition {
            transition: opacity 0.4s ease-in-out, transform 0.4s ease-in-out;
        }

        .hide-slide {
            opacity: 0;
            transform: scale(0.95) translateY(10px);
        }

        .show-slide {
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .avatar-float {
            animation: float 4s ease-in-out infinite;
        }
    </style>
</head>
<body class="bg-black text-white h-screen w-full overflow-hidden flex flex-col relative cursor-pointer" onclick="nextSlide()">

    <!-- Background -->
    <div class="absolute inset-0 z-0">
        <img src="https://images.unsplash.com/photo-1532767153582-b1a0e5145009?q=80&w=1000&auto=format&fit=crop" 
             alt="Night Sky Background" 
             class="w-full h-full object-cover opacity-60" 
             onerror="this.style.display='none'" />
        <div class="absolute inset-0 bg-gradient-to-b from-black/30 via-black/50 to-black/80"></div>
    </div>

    <!-- Kontainer Utama -->
    <div class="relative z-10 flex-1 flex flex-col items-center justify-center px-6 max-w-md mx-auto w-full">
        
        <div id="slide-container" class="fade-transition show-slide flex flex-col items-center w-full">
            
            <!-- Lingkaran Avatar -->
            <div class="avatar-float mb-8 relative">
                <div class="w-40 h-40 rounded-full border-4 border-white/80 bg-white/80 backdrop-blur-md shadow-[0_0_30px_rgba(255,255,255,0.3)] flex items-center justify-center overflow-hidden relative">
                    
                    <!-- Gambar GIF -->
                    <img id="gif-display" src="https://c.tenor.com/cE0Pj9W_0YIAAAAj/bubu-dudu-flower.gif" alt="Panda" class="w-32 h-32 object-contain scale-110" onerror="handleImageError()">
                    
                    <!-- Fallback Emoji (Hanya muncul jika gambar gagal diload/blank) -->
                    <span id="fallback-emoji" class="text-7xl absolute mt-4 hidden">🐼💐</span>

                </div>
            </div>

            <!-- Teks Dialog -->
            <div class="w-full relative">
                <div class="absolute -inset-1 border border-white/30 rounded-3xl z-0"></div>
                <div class="bg-black/40 backdrop-blur-lg border-2 border-white/80 rounded-2xl p-6 min-h-[140px] flex items-center justify-center text-center shadow-2xl relative z-10">
                    <p id="text-display" class="text-xl md:text-2xl font-bold leading-relaxed drop-shadow-lg text-white">
                        hai pacar aku <br> yang gemesin bangett&lt;333
                    </p>
                </div>
            </div>

            <!-- Petunjuk Klik -->
            <div class="mt-12 h-8">
                <p id="hint-text" class="text-white/70 text-sm font-semibold tracking-widest uppercase animate-pulse">
                    Klik Layar untuk Geser!
                </p>
            </div>

        </div>

        <button id="btn-restart" onclick="restartSlide(event)" class="hidden mt-8 px-6 py-2 bg-white/20 hover:bg-white/30 backdrop-blur-md rounded-full border border-white/50 transition-all font-bold text-sm">
            Ulangi Lagi 🔄
        </button>

    </div>

    <script>
        // Data Urutan Cerita (GIF dan Emoji Cadangan)
        const storyData = [
            { 
                gif: 'cute.gif',
                emoji: '🐼💐',
                text: 'hai pacar aku <br> yang gemesin bangett&lt;333' 
            },
            { 
                gif: 'cute.gif',
                emoji: '🐼🌸',
                text: 'asal kamu tau yaaa' 
            },
            { 
                gif: 'cute3.gif',
                emoji: '🐼💖',
                text: 'aku bener² <br> mencintaimuu&lt;3333'  
            },
            { 
                gif: 'cute.gif',
                emoji: '🐼🥺',
                text: 'tapi maaf ya kalau <br> aku selalu bikin kamu marah,' 
            },
            { 
                gif: 'cute4.gif',
                emoji: '🐼🚪',
                text: 'dan aku juga sangat <br> takut kehilangan kamu:('
            },
            { 
                gif: 'cute2.gif',
                emoji: '🐼💞🐻',
                text: 'jadi aku minta maaf ya <br> hehehe i love youuu 💖🤍💘' 
            }
        ];

        let currentIndex = 0;
        let isAnimating = false;

        const container = document.getElementById('slide-container');
        const gifDisplay = document.getElementById('gif-display');
        const fallbackEmoji = document.getElementById('fallback-emoji');
        const textDisplay = document.getElementById('text-display');
        const hintText = document.getElementById('hint-text');
        const btnRestart = document.getElementById('btn-restart');

        // Preload gambar
        storyData.forEach(data => {
            const img = new Image();
            img.src = data.gif;
        });

        // Fungsi jika gambar gagal diload (terblokir)
        function handleImageError() {
            gifDisplay.classList.add('hidden');
            fallbackEmoji.classList.remove('hidden');
            fallbackEmoji.innerHTML = storyData[currentIndex].emoji;
        }

        function nextSlide() {
            if (isAnimating || currentIndex >= storyData.length - 1) return;
            isAnimating = true;
            currentIndex++;

            container.classList.remove('show-slide');
            container.classList.add('hide-slide');

            setTimeout(() => {
                // Reset tampilan gambar
                gifDisplay.classList.remove('hidden');
                fallbackEmoji.classList.add('hidden');
                
                // Set konten baru
                gifDisplay.src = storyData[currentIndex].gif;
                textDisplay.innerHTML = storyData[currentIndex].text;

                if (currentIndex === storyData.length - 1) {
                    hintText.classList.add('hidden');
                    btnRestart.classList.remove('hidden');
                }

                container.classList.remove('hide-slide');
                container.classList.add('show-slide');
                isAnimating = false;
            }, 400);
        }

        function restartSlide(event) {
            event.stopPropagation(); 
            if (isAnimating) return;
            isAnimating = true;

            container.classList.remove('show-slide');
            container.classList.add('hide-slide');

            setTimeout(() => {
                currentIndex = 0;
                
                gifDisplay.classList.remove('hidden');
                fallbackEmoji.classList.add('hidden');

                gifDisplay.src = storyData[currentIndex].gif;
                textDisplay.innerHTML = storyData[currentIndex].text;
                
                hintText.classList.remove('hidden');
                btnRestart.classList.add('hidden');

                container.classList.remove('hide-slide');
                container.classList.add('show-slide');
                isAnimating = false;
            }, 400);
        }
    </script>
</body>
</html>
